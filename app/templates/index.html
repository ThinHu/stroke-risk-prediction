<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Dự đoán Đột quỵ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">

    <link rel="icon" type="image/png" href="{{ url_for('static', path='/img/favicon.png') }}">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="font-bold text-xl tracking-wider flex items-center gap-2">
                <img src="{{ url_for('static', path='/img/favicon.png') }}" alt="StrokePredict Logo" class="w-6 h-6 object-contain rounded">
                StrokePredict AI
            </div>
            <div class="space-x-4">
                <a href="/" class="hover:text-blue-200 font-semibold border-b-2 border-white pb-1">Dự đoán</a>
                <a href="/first-aid" class="hover:text-blue-200">Sơ cứu</a>
                <a href="/lifestyle" class="hover:text-blue-200">Nếp sống</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-10 p-4">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Đánh giá rủi ro đột quỵ</h1>
            <p class="text-gray-600">Hệ thống phân tích dựa trên các chỉ số sinh học và thói quen sinh hoạt</p>
        </div>

        <div class="bg-white rounded-xl shadow-md p-8 fade-in">
            <form id="predictionForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Giới tính</label>
                    <select id="gender" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border">
                        <option value="" disabled selected>Chọn</option>
                        <option value="Male">Nam</option>
                        <option value="Female">Nữ</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tuổi</label>
                    <input type="number" id="age" min="0" max="120" step="1" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border" placeholder="VD: 45">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Cân nặng (kg)</label>
                    <input type="number" id="weight" step="0.1" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border" placeholder="VD: 65">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Chiều cao (cm)</label>
                    <input type="number" id="height" step="1" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border" placeholder="VD: 170">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Đường huyết TB (mg/dL)</label>
                    <input type="number" id="avg_glucose_level" step="0.1" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border" placeholder="VD: 105.5">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tiền sử Cao huyết áp</label>
                    <select id="hypertension" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border">
                        <option value="" disabled selected>Chọn</option>
                        <option value="1">Có</option>
                        <option value="0">Không</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tiền sử Bệnh tim mạch</label>
                    <select id="heart_disease" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border">
                        <option value="" disabled selected>Chọn</option>
                        <option value="1">Có</option>
                        <option value="0">Không</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tình trạng hôn nhân</label>
                    <select id="ever_married" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border">
                        <option value="" disabled selected>Chọn</option>
                        <option value="Yes">Đã từng kết hôn</option>
                        <option value="No">Chưa kết hôn</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Loại công việc</label>
                    <select id="work_type" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border">
                        <option value="" disabled selected>Chọn</option>
                        <option value="Private">Tư nhân</option>
                        <option value="Self-employed">Tự kinh doanh</option>
                        <option value="Govt_job">Nhà nước</option>
                        <option value="children">Trẻ em</option>
                        <option value="Never_worked">Chưa từng làm việc</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Khu vực sinh sống</label>
                    <select id="Residence_type" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border">
                        <option value="" disabled selected>Chọn</option>
                        <option value="Urban">Thành thị</option>
                        <option value="Rural">Nông thôn</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tình trạng hút thuốc</label>
                    <select id="smoking_status" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border">
                        <option value="" disabled selected>Chọn</option>
                        <option value="never smoked">Chưa từng hút</option>
                        <option value="formerly smoked">Đã bỏ thuốc</option>
                        <option value="smokes">Đang hút</option>
                        <option value="Unknown">Không rõ</option>
                    </select>
                </div>

                <div class="md:col-span-2 mt-4">
                    <div id="validationError" class="text-red-600 font-medium text-sm mb-3 hidden bg-red-50 p-3 rounded border border-red-200"></div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition shadow-md flex justify-center items-center">
                        <span id="btnText">Tiến hành Phân tích</span>
                        <svg id="loadingIcon" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </button>
                </div>
            </form>

            <div id="resultBox" class="mt-8 p-6 rounded-lg hidden text-center border-l-4">
                <h3 id="resultTitle" class="text-2xl font-bold mb-2"></h3>
                <p id="resultProb" class="text-lg mb-4"></p>
                <p id="resultAdvice" class="text-gray-700"></p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-100 text-gray-500 py-6 text-center mt-12 text-sm">
        <p>© 2026 StrokePredict AI</p>
    </footer>

    <script>
        const fieldMap = {
            'gender': 'Giới tính', 'age': 'Tuổi', 'ever_married': 'Tình trạng hôn nhân',
            'work_type': 'Loại công việc', 'Residence_type': 'Khu vực sinh sống',
            'smoking_status': 'Tình trạng hút thuốc', 'weight': 'Cân nặng', 'height': 'Chiều cao',
            'avg_glucose_level': 'Đường huyết trung bình', 'hypertension': 'Tiền sử Cao huyết áp',
            'heart_disease': 'Tiền sử Bệnh tim mạch'
        };

        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const validationError = document.getElementById('validationError');
            const resultBox = document.getElementById('resultBox');
            
            validationError.classList.add('hidden');
            resultBox.classList.add('hidden');

            let missingFields = [];
            for (let id in fieldMap) {
                if (document.getElementById(id).value.trim() === "") missingFields.push(fieldMap[id]);
            }

            if (missingFields.length > 0) {
                validationError.innerHTML = "⚠️ <strong>Thiếu thông tin:</strong> " + missingFields.join(", ");
                validationError.classList.remove('hidden');
                return;
            }

            const btnText = document.getElementById('btnText');
            const loadingIcon = document.getElementById('loadingIcon');
            btnText.innerText = "Đang phân tích...";
            loadingIcon.classList.remove('hidden');

            const patientData = {
                gender: document.getElementById('gender').value,
                age: parseFloat(document.getElementById('age').value),
                hypertension: parseInt(document.getElementById('hypertension').value),
                heart_disease: parseInt(document.getElementById('heart_disease').value),
                ever_married: document.getElementById('ever_married').value,
                work_type: document.getElementById('work_type').value,
                Residence_type: document.getElementById('Residence_type').value,
                avg_glucose_level: parseFloat(document.getElementById('avg_glucose_level').value),
                weight: parseFloat(document.getElementById('weight').value),
                height: parseFloat(document.getElementById('height').value),
                smoking_status: document.getElementById('smoking_status').value
            };

            try {
                const response = await fetch('/predict_api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(patientData)
                });
                const result = await response.json();
                if (!response.ok) throw new Error("Máy chủ gặp sự cố.");

                const resultTitle = document.getElementById('resultTitle');
                const resultProb = document.getElementById('resultProb');
                const resultAdvice = document.getElementById('resultAdvice');

                resultBox.classList.remove('bg-red-50', 'border-red-500', 'bg-blue-50', 'border-blue-500');

                if (result.is_at_risk) {
                    resultBox.classList.add('bg-red-50', 'border-red-500');
                    resultTitle.innerText = "NGUY CƠ CAO";
                    resultTitle.className = "text-2xl font-bold mb-2 text-red-700";
                    resultAdvice.innerText = "Hệ thống phát hiện các chỉ số rủi ro. Vui lòng tham khảo ý kiến bác sĩ.";
                } else {
                    resultBox.classList.add('bg-blue-50', 'border-blue-500');
                    resultTitle.innerText = "NGUY CƠ THẤP";
                    resultTitle.className = "text-2xl font-bold mb-2 text-blue-700";
                    resultAdvice.innerText = "Các chỉ số hiện tại nằm trong vùng an toàn. Duy trì lối sống lành mạnh nhé!";
                }
                resultProb.innerHTML = `Xác suất rủi ro: <strong>${result.risk_probability}%</strong>`;
                resultBox.classList.remove('hidden');

            } catch (error) {
                validationError.innerHTML = "⚠️ <strong>Lỗi:</strong> " + error.message;
                validationError.classList.remove('hidden');
            } finally {
                btnText.innerText = "Tiến hành Phân tích";
                loadingIcon.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
